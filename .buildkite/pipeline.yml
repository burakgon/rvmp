# codegent CI. Agent requirements: git and bun >= 1.3.14 on PATH.
# (1.3.14 is the floor for bunfig `test.pathIgnorePatterns`, which keeps
# `bun test` from sweeping the vendored ghostty-web suite — see bunfig.toml.)
#
# The ghostty-web submodule is needed at install time only for its
# package.json (`file:` dependency of apps/web); no test imports the package,
# so CI never builds its wasm/dist and agents need no Zig. The init is
# deliberately non-recursive: ghostty-web's nested `ghostty` submodule
# (~206MB) is a wasm-build-only input.
#
# SHELL must exist in the process env: the daemon's PTY tests spawn
# `$SHELL -i` with a /bin/zsh fallback, and Linux agents may have neither
# SHELL exported nor zsh installed. Verified on Linux (bun 1.3.14): without
# SHELL the 5 PTY tests fail; with it, 19/19 pass. /bin/bash exists on both
# agent platforms.
env:
  SHELL: /bin/bash

steps:
  - label: ":linux: test"
    key: linux
    if: build.source != "schedule"
    agents: { os: linux }
    command: |
      git submodule update --init
      bun install --frozen-lockfile
      bun test

  - label: ":mac: test"
    key: mac
    if: build.source != "schedule"
    agents: { os: macos }
    command: |
      git submodule update --init
      bun install --frozen-lockfile
      bun test

  # Typecheck is platform-independent, so one Linux agent is enough. The
  # submodule init is still needed for `bun install` (file: dep package.json,
  # same as the test steps). tsc does NOT need the vendor dist/ build: when
  # dist/index.d.ts is absent, apps/web/tsconfig.json `paths` falls back to
  # the checked-in snapshot apps/web/types/ghostty-web.d.ts.
  - label: ":typescript: typecheck"
    key: typecheck
    if: build.source != "schedule"
    agents: { os: linux }
    command: |
      git submodule update --init
      bun install --frozen-lockfile
      bun run typecheck

  # Buildkite schedules are pipeline control-plane objects (Settings >
  # Schedules, or the pipeline-schedules API), not a pipeline.yml key. At
  # launch, add an @daily schedule on the default branch; build.source is then
  # "schedule", selecting only this best-effort compatibility alarm.
  - label: ":claude: nightly agent contract"
    key: agent-contract-nightly
    if: build.source == "schedule"
    agents: { os: linux }
    soft_fail: true
    timeout_in_minutes: 10
    command: |
      git submodule update --init
      bun install --frozen-lockfile
      CODEGENT_CONTRACT_LIVE=1 bun test apps/daemon/test/contract
