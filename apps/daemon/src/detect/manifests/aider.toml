# DERIVED-per-doc (conservative): docs/research/herdr-agent-state.md §3b records
# spinner + "esc to interrupt" as working evidence; no Aider TUI capture is recorded.
[[rules]]
id = "screen_working_interrupt"
state = "working"
priority = 800
region = "bottom_non_empty_lines(3)"
line_regex = ['(?i)^\s*(?:[\x{2800}-\x{28FF}]|[•◦✦⏲])\s+.*\besc to interrupt\b']

# DERIVED-per-doc (conservative): docs/research/herdr-agent-state.md §3b defines
# bordered prompt-box extraction; the Aider prompt marker here is a starter fixture.
[[rules]]
id = "prompt_box_idle"
state = "idle"
priority = 700
region = "prompt_box_body"
line_regex = ['(?i)^\s*aider>\s*$']

# DERIVED-per-doc (conservative): docs/research/herdr-agent-state.md §3b records
# strict-positive blocker polarity, but no Aider blocker screen. Require an action
# question and explicit Yes and No choices so uncertain forms retain idle fallback.
[[rules]]
id = "explicit_yes_no_blocked"
state = "blocked"
priority = 600
region = "whole_recent"
regex = ['(?i)\b(?:allow|approve|create|proceed|continue|permission)\b[^\n?]*\?']
line_regex = ['(?i)^\s*(?:❯|>)?\s*(?:1[.)]\s*)?yes\b', '(?i)^\s*(?:2[.)]\s*)?no\b']
